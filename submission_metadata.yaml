ai_usage_summary: |
  Used Claude for architecture discussion and code review.
  All candidate data was processed locally — no data sent to any LLM.
  No AI tools used during the actual ranking computation.

methodology_summary: |
  6-pillar hybrid scoring system. Pillar 1: 11-check honeypot detection
  (expert+0-duration, YoE mismatch, invalid dates, services-only career, etc).
  Pillar 2: knowledge-graph semantic skill matching with alias resolution and
  partial-match credit. Pillar 3: counterfactual fairness for education tiers.
  Pillar 4: RL-style reward from 23 behavioral signals with behavioral multiplier.
  Pillar 5: OCEAN personality proxy from platform signals. Pillar 6: JD-agnostic
  config for any role. Runtime ~90s on CPU. Zero external dependencies.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
