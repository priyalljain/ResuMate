# =============================================================
# Redrobb Hackathon — Submission Metadata TEMPLATE
# =============================================================
# HOW TO USE:
#   1. Copy this file:  cp submission_metadata.example.yaml submission_metadata.yaml
#   2. Fill in YOUR details in submission_metadata.yaml
#   3. submission_metadata.yaml is gitignored (has your private info)
#   4. This example file IS committed — it shows the structure safely
# =============================================================

team_name: "your-team-name-here"

primary_contact:
  name: "Full Name"
  email: "primary@example.com"
  phone: "+91-XXXXXXXXXX"

team_members:
  - name: "Member 1 Full Name"
    email: "member1@example.com"
    role: "ML Engineer"
  - name: "Member 2 Full Name"
    email: "member2@example.com"
    role: "Data Engineer"

github_repo: "https://github.com/YOUR_USERNAME/redrobb-ranker"
sandbox_link: "https://huggingface.co/spaces/YOUR_USERNAME/redrobb-ranker"

reproduce_command: "python rank.py --candidates ./candidates.jsonl --out ./submission.csv"

compute:
  platform: "CPU"
  cpu_cores: 8
  ram_gb: 16
  python_version: "3.11"
  os: "Linux / macOS / Windows"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: false
  pre_computation_time_minutes: 0

ai_tools_used:
  - "Claude"
  - "GitHub Copilot"

ai_usage_summary: |
  Used Claude for architecture discussion and code review.
  All candidate data processed locally — no data sent to any LLM.
  No AI tools used during actual ranking computation.

methodology_summary: |
  6-pillar hybrid scoring system. Pillar 1: 11-check honeypot detection.
  Pillar 2: knowledge-graph semantic skill matching. Pillar 3: counterfactual
  fairness for education tiers. Pillar 4: RL-style reward from all 23 behavioral
  signals. Pillar 5: OCEAN personality proxy. Pillar 6: JD-agnostic config.
  Runtime ~90s on CPU. Zero external dependencies during ranking.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
